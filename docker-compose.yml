services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tmdb-moviedb-app
    ports:
      - "5173:5173"
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_TMDB_API_BASE_URL: ${VITE_TMDB_API_BASE_URL}
      VITE_TMDB_IMAGE_BASE_URL: ${VITE_TMDB_IMAGE_BASE_URL}
      VITE_TMDB_BEARER_TOKEN: ${VITE_TMDB_BEARER_TOKEN}
      VITE_TMDB_LANGUAGE: ${VITE_TMDB_LANGUAGE}
      VITE_TMDB_REGION: ${VITE_TMDB_REGION}
    volumes:
      - .:/app
      - /app/node_modules
